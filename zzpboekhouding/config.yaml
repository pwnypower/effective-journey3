name: "ZZP Boekhouding"
description: "Lokale boekhoud-webapp voor ZZP'ers: klanten, facturen, uitgaven, BTW-overzicht en Mollie-koppeling."
version: "2.2.2"
slug: "zzpboekhouding"
init: false
arch:
  - aarch64
  - amd64
  - armv7
  - armhf
  - i386
# Ingress = toegang via de HA-interface zelf (en dus ook via Nabu Casa remote, als je dat
# gebruikt) zonder los poort/domein. Werkt voor jou als gebruiker; Mollie en e-mail-links
# naar klanten hebben nog steeds de losse poort + app_base_url nodig (zie README).
ingress: true
ingress_port: 5000
ingress_stream: false
panel_icon: mdi:finance
panel_title: "ZZP Boekhouding"
# webui = knop "OPEN WEB UI" op het Info-tabblad van de add-on, los van ingress, handig
# voor snel testen op je lokale netwerk.
webui: "http://[HOST]:[PORT:5000]"
ports:
  5000/tcp: 5000
ports_description:
  5000/tcp: "Web-interface (nodig voor Mollie-webhook/publieke factuurlinks - zet hierachter je reverse proxy/subdomein)"
map:
  - addon_config:rw
  - data:rw
options:
  bedrijfsnaam: "Mijn ZZP Bedrijf"
  kvk_nummer: ""
  btw_nummer: ""
  iban: ""
  app_base_url: ""
  mollie_api_key: ""
  smtp_host: ""
  smtp_port: 587
  smtp_user: ""
  smtp_password: ""
  smtp_from: ""
  smtp_use_tls: true
schema:
  bedrijfsnaam: "str"
  kvk_nummer: "str?"
  btw_nummer: "str?"
  iban: "str?"
  app_base_url: "str?"
  mollie_api_key: "str?"
  smtp_host: "str?"
  smtp_port: "port?"
  smtp_user: "str?"
  smtp_password: "password?"
  smtp_from: "str?"
  smtp_use_tls: "bool?"

